schema_version: 2
owner: rewrite_v2
description: >
  Canonical symbol to Nautilus instrument mapping for the V2 rewrite.
  Execution-facing adapters must load this file instead of reconstructing
  venue, precision, or contract metadata ad hoc.

defaults:
  source_system: PARQUET
  nautilus_venue: SIM
  timezone: UTC
  aggregation_source: EXTERNAL
  data_kind: bars

mappings:
  - mt5_symbol: EURUSD
    aliases:
      - EURUSD
      - EURUSDm
      - EURUSD.r
    nautilus_symbol: EUR/USD
    nautilus_instrument_id: EUR/USD.SIM
    instrument_type: CURRENCY_PAIR
    venue: SIM
    asset_class: FX
    base_currency: EUR
    quote_currency: USD
    price_precision: 5
    size_precision: 2
    tick_size: 0.00001
    point_size: 0.00001
    size_increment: 0.01
    lot_size: 100000
    multiplier: 1
    margin_init: 0.03
    margin_maint: 0.03
    maker_fee: 0.00002
    taker_fee: 0.00002
